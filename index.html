<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

/* Barre du haut */
header {
    background: linear-gradient(90deg, #00c853, #ffffff);
    color: black;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* Conteneur principal */
.container {
    padding: 40px;
    text-align: center;
}

/* Titre */
h1 {
    color: #00c853;
    font-size: 40px;
}

/* Texte */
p {
    color: #ccc;
    font-size: 18px;
}

/* Bouton */
button {
    background-color: #00c853;
    color: black;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    margin-top: 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: white;
    color: black;
}

/* Cartes */
.card {
    background-color: #1a1a1a;
    padding: 20px;
    margin: 15px;
    border-radius: 12px;
    display: inline-block;
    width: 200px;
    border: 1px solid #00c853;
}

/* Pied de page */
footer {
    margin-top: 50px;
    padding: 20px;
    background-color: #000;
    text-align: center;
    color: #777;
}
</style>

</head>

<body>

<header>
    🟢 STRONGIS STORE
</header>

<div class="container">

    <h1>Bienvenue 👋</h1>
    <p>merhba bikom.</p>

    <button>Commencer</button>

    <div>
        <div class="card">Produit 1</div>
        <div class="card">Produit 2</div>
        <div class="card">Produit 3</div>
    </div>

</div>

<footer>
    © 2026 Tous droits réservés
</footer>

</body>
</html>
